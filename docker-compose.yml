version: "3.9"

services:
  # ── Backend API ────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:password@postgres:5432/maritime_crew
      - REDIS_URL=redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - maritime-net

  # ── Frontend ───────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - NEXT_PUBLIC_WS_URL=ws://localhost:8000
    depends_on:
      - backend
    networks:
      - maritime-net

  # ── PostgreSQL (Apache AGE enabled) ─────────────────────────────────────────
  # AGE-enabled Postgres 16 image — the context graph runs INSIDE this same DB.
  # It is a superset of stock Postgres, so it works for BOTH backends:
  #   GRAPH_BACKEND=fallback → subgraph built in Python (AGE unused)
  #   GRAPH_BACKEND=age      → real AGE graph; after `up`, seed it once:
  #                            docker-compose exec backend python -m scripts.seed_crew
  #                            docker-compose exec backend python -m scripts.seed_graph
  # NOTE: switching the image requires a fresh volume — run `docker-compose down -v` once.
  postgres:
    image: apache/age:release_PG16_1.6.0
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: maritime_crew
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - maritime-net

  # ── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - maritime-net

volumes:
  postgres-data:

networks:
  maritime-net:
    driver: bridge
