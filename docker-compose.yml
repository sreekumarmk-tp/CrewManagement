version: "3.9"

services:
  # ── Backend API ────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:password@postgres:5432/maritime_crew
      - REDIS_URL=redis://redis:6379
      # L4 #3 — use pgvector for structural-embedding similarity (the postgres image
      # below provides it). Set to "fallback" to compute cosine in Python instead.
      - VECTOR_BACKEND=pgvector
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - maritime-net

  # ── Frontend ───────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - NEXT_PUBLIC_WS_URL=ws://localhost:8000
    depends_on:
      - backend
    networks:
      - maritime-net

  # ── PostgreSQL (Apache AGE + pgvector) ──────────────────────────────────────
  # Custom image built from L2Knowledge_graph/deploy/postgres-age.Dockerfile:
  # pgvector/pgvector:pg16 (provides the `vector` extension) with Apache AGE compiled
  # on top. One DB serves every backend:
  #   GRAPH_BACKEND=fallback  → subgraph built in Python (AGE unused)
  #   GRAPH_BACKEND=age       → real AGE graph (seed via scripts.seed_graph)
  #   VECTOR_BACKEND=fallback → embedding cosine computed in Python (pgvector unused)
  #   VECTOR_BACKEND=pgvector → pgvector `<=>` similarity in the DB
  # After `up`, seed once:
  #   docker-compose exec backend python -m scripts.seed_crew
  #   docker-compose exec backend python -m scripts.seed_graph
  # NOTE: switching the image requires a fresh volume — run `docker-compose down -v` once.
  postgres:
    build:
      context: ./backend/L2Knowledge_graph/deploy
      dockerfile: postgres-age.Dockerfile
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: maritime_crew
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - maritime-net

  # ── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - maritime-net

volumes:
  postgres-data:

networks:
  maritime-net:
    driver: bridge
